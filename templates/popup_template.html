<style>
  .route-popup {
    font-family: system-ui, sans-serif;
    line-height: 1.45;
    color: #222;
  }

  .route-popup h3 {
    margin: 0 0 6px 0;
    font-size: 20px;
    font-weight: 600;
  }

  .route-popup .category {
    font-size: 13px;
    color: #666;
    margin-bottom: 10px;
  }

  .route-popup img {
    width: 100%;
    border-radius: 4px;
    margin: 10px 0;
  }

  .route-popup .desc {
    margin-top: 10px;
    font-size: 14px;
  }

  .tech-data {
    margin-top: 12px;
    padding: 10px;
    background: #f5f5f5;
    border-radius: 6px;
    font-size: 14px;
  }

  .btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 14px;
    background: #0078ff;
    color: white !important;
    border-radius: 6px;
    font-size: 14px;
    text-decoration: none;
    font-weight: 600;
    text-align: center;
  }

  .btn:hover {
    background: #005fcc;
  }
</style>

<div class="route-popup">
  <h3>$title</h3>

  <div class="category">$category</div>

  <img src="$elevation_image" alt="Altimetria">

  <div class="desc">
    $description
  </div>

  <div class="tech-data">
    <strong>Distanza:</strong> $distance_km km<br>
    <strong>Durata stimata:</strong> $duration_h h<br>
    <strong>Dislivello positivo:</strong> $elevation_gain m
  </div>

  <a href="$gpx_pages_url" download="$title.gpx" style="
    display:inline-block;
    padding:10px 14px;
    background:#0078ff;
    color:white;
    border-radius:6px;
    font-size:14px;
    text-decoration:none;
    font-weight:600;
  ">
    ⬇ Scarica GPX
  </a>
  <a class="btn" href="$maps_url" target="_blank">📍 Google Maps</a>
  <a class="btn" href="$osmand_url" target="_blank">📱 OsmAnd</a>
  <a class="btn" href="$gpxviewer_url" target="_blank">🗺 GPX Viewer</a>
</div>
